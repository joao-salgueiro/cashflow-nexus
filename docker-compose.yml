services:
  postgres:
    image: postgres:15-alpine
    container_name: cashflow-nexus-db
    environment:
      POSTGRES_DB: cashflow_nexus
      POSTGRES_USER: cashflow_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cashflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cashflow-nexus-app
    working_dir: /app
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cashflow_nexus
      DB_USERNAME: cashflow_user
      DB_PASSWORD: password123
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - cashflow-network
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  postgres_data:

networks:
  cashflow-network:
    driver: bridge